<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadestr</title>
    <link data-trunk rel="rust" data-bin="arcadestr-web" data-target-name="arcadestr-web"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d0d0d;
            color: #fff;
            min-height: 100vh;
        }
        
        /* Relay status dot styles */
        .relay-status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            flex-shrink: 0;
        }
        
        .relay-status-dot.connected {
            background: #22c55e;
        }
        
        .relay-status-dot.disconnected {
            background: #ef4444;
        }
        
        /* Ensure relay dropdown items align properly */
        .relay-dropdown-item {
            display: flex;
            align-items: center;
            padding: 8px 12px;
        }
    </style>
</head>
<body>
    <div id="app"></div>
</body>
</html>
